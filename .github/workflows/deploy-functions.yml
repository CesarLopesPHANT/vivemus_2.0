name: Deploy Edge Functions

on:
  push:
    branches: [main]
    paths:
      - 'backend/functions/**'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Deploy Edge Functions
        run: |
          cd backend
          supabase functions deploy pso-proxy --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy webhook-handler --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
          supabase functions deploy sync-on-login --project-ref ${{ secrets.SUPABASE_PROJECT_ID }}
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
