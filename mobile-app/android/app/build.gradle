apply plugin: "com.android.application"
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

/**
 * Carrega x-api-key da DAV de local.properties ou variavel de ambiente.
 * Uso no codigo Java: BuildConfig.DAV_API_KEY
 */
def davApiKey = ""
def localPropertiesFile = rootProject.file("local.properties")
if (localPropertiesFile.exists()) {
    def localProperties = new Properties()
    localProperties.load(new FileInputStream(localPropertiesFile))
    davApiKey = localProperties.getProperty("DAV_API_KEY", "")
}
if (davApiKey.isEmpty()) {
    davApiKey = System.getenv("DAV_API_KEY") ?: ""
}

/**
 * Carrega propriedades de assinatura para release build.
 */
def keystorePropertiesFile = rootProject.file("keystore.properties")
def keystoreProperties = new Properties()
if (keystorePropertiesFile.exists()) {
    keystoreProperties.load(new FileInputStream(keystorePropertiesFile))
}

react {
    // Configura o plugin React Native Gradle
    // Defaults: bundleInDebug = false, bundleInRelease = true
    // hermesEnabled configurado via gradle.properties
}

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.vivemus.mobile"

    defaultConfig {
        applicationId "com.vivemus.mobile"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 3
        versionName "2.1.0"

        // x-api-key disponivel como BuildConfig.DAV_API_KEY no Java
        buildConfigField "String", "DAV_API_KEY", "\"${davApiKey}\""
    }

    signingConfigs {
        debug {
            storeFile file("debug.keystore")
            storePassword "android"
            keyAlias "androiddebugkey"
            keyPassword "android"
        }
        release {
            if (keystorePropertiesFile.exists()) {
                storeFile file(keystoreProperties["storeFile"] ?: "debug.keystore")
                storePassword keystoreProperties["storePassword"] ?: ""
                keyAlias keystoreProperties["keyAlias"] ?: ""
                keyPassword keystoreProperties["keyPassword"] ?: ""
            }
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.release.storeFile ? signingConfigs.release : signingConfigs.debug
            minifyEnabled true
            shrinkResources true
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }

    buildFeatures {
        buildConfig true
    }

    compileOptions {
        sourceCompatibility JavaVersion.VERSION_17
        targetCompatibility JavaVersion.VERSION_17
    }

    kotlinOptions {
        jvmTarget = "17"
    }
}

dependencies {
    // React Native (gerenciado automaticamente pelo plugin)
    implementation("com.facebook.react:react-android")

    // Hermes JS Engine
    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // AndroidX
    implementation("androidx.core:core-ktx:1.15.0")
    implementation("androidx.appcompat:appcompat:1.7.0")
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle")
applyNativeModulesAppBuildGradle(project)
