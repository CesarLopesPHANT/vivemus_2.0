# Project-wide Gradle settings
# https://docs.gradle.org/current/userguide/build_environment.html

# JVM memory allocation
org.gradle.jvmargs=-Xmx2048m -XX:MaxMetaspaceSize=512m

# AndroidX (obrigatorio para React Native 0.76+)
android.useAndroidX=true
android.enableJetifier=true

# React Native: New Architecture (desativada por padrao — ativar quando pronto)
newArchEnabled=false

# React Native: Hermes JS Engine (padrao em 0.76+)
hermesEnabled=true

# Assinatura de release (configurar antes de publicar na Play Store)
# VIVEMUS_UPLOAD_STORE_FILE=vivemus-release.keystore
# VIVEMUS_UPLOAD_KEY_ALIAS=vivemus-key
# VIVEMUS_UPLOAD_STORE_PASSWORD=****
# VIVEMUS_UPLOAD_KEY_PASSWORD=****

# x-api-key da Doutor ao Vivo (injetada via CI/CD ou local.properties)
# DAV_API_KEY=sua-chave-aqui
